<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikina — Quick Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="panel-shell">

    <!-- Status pill -->
    <div class="panel-status">
      <div class="status-ring" id="status-ring">
        <div class="ring-inner"></div>
      </div>
      <span class="status-text" id="status-text">IDLE</span>
      <span class="tier-badge">TIER 1</span>
    </div>

    <!-- Quick action grid -->
    <div class="quick-grid">
      <button class="qb" id="qb-mic"    title="Voice input (Phase 5)">
        <span class="qb-icon">🎤</span><span class="qb-lbl">MIC</span>
      </button>
      <button class="qb" id="qb-clip"   data-cmd="clipboard" title="Clipboard">
        <span class="qb-icon">📋</span><span class="qb-lbl">CLIP</span>
      </button>
      <button class="qb" id="qb-tasks"  title="Tasks">
        <span class="qb-icon">✓</span><span class="qb-lbl">TASKS</span>
      </button>
      <button class="qb" id="qb-snip"   title="Screenshot (Phase 5)">
        <span class="qb-icon">✂</span><span class="qb-lbl">SNIP</span>
      </button>
      <button class="qb" id="qb-log"    data-action="events" title="Event Log">
        <span class="qb-icon">≡</span><span class="qb-lbl">LOG</span>
      </button>
      <button class="qb qb--kill" id="qb-kill" title="KILL — Halt all processes">
        <span class="qb-icon">⏻</span><span class="qb-lbl">KILL</span>
      </button>
    </div>

    <!-- Command input -->
    <div style="position: relative; width: 100%;">
      <div class="panel-input-row">
        <span class="panel-prefix">›_</span>
        <input
          type="text"
          id="panel-input"
          class="panel-input"
          placeholder="open vs code · lock screen · find file *.pdf"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
      </div>
      
      <!-- Autocomplete Dropdown -->
      <div id="cmd-suggestions" class="cmd-suggestions hidden"></div>
    </div>

    <!-- Result -->
    <div class="panel-result" id="panel-result"></div>

  </div>

  <script src="panel.js"></script>
</body>
</html>
